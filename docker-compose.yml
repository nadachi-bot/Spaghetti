services:
  factorio-manager:
    build: .
    container_name: factorio-manager
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - FACTORIO_PORT=8080
      - FACTORIO_USERNAME=${FACTORIO_USERNAME:-}
      - FACTORIO_TOKEN=${FACTORIO_TOKEN:-}
    volumes:
      # Persist configuration, server binaries, mods, and saves
      - factorio-data:/app/data
    # Adjust ulimit for file descriptors (Factorio may open many files)
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

volumes:
  factorio-data:
    driver: local
